<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>分泌蛋白地图素材预览</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      color: #243044;
      background: linear-gradient(135deg, #f7fbf4, #e7f4f6 55%, #fff2dc);
    }
    main { width: min(1180px, 100%); margin: 0 auto; padding: 28px; }
    h1 { margin: 0 0 18px; font-size: clamp(24px, 3vw, 36px); letter-spacing: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }
    figure {
      margin: 0;
      border-radius: 8px;
      overflow: hidden;
      background: rgba(255,255,255,.84);
      box-shadow: 0 12px 28px rgba(28,45,62,.12);
    }
    .preview {
      height: 150px;
      display: grid;
      place-items: center;
      padding: 12px;
      background:
        linear-gradient(45deg, rgba(30,45,60,.08) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(30,45,60,.08) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(30,45,60,.08) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(30,45,60,.08) 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    }
    img { max-width: 100%; max-height: 126px; object-fit: contain; }
    figcaption { display: grid; gap: 5px; padding: 11px 12px 13px; }
    strong { font-size: 15px; }
    span { color: #197f8f; font-size: 12px; word-break: break-all; }
    em { color: #657382; font-size: 12px; line-height: 1.45; font-style: normal; }
  </style>
</head>
<body>
  <main>
    <h1>分泌蛋白地图素材预览</h1>
    <section class="grid">
      
        <figure>
          <div class="preview"><img src="background-full.png" alt="完整地图背景"></div>
          <figcaption><strong>完整地图背景</strong><span>background-full.png</span><em>完整原图，可作为底图</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="nucleus-castle.png" alt="细胞核城堡"></div>
          <figcaption><strong>细胞核城堡</strong><span>nucleus-castle.png</span><em>细胞核区域，可做起点场景</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="rough-er.png" alt="粗面内质网"></div>
          <figcaption><strong>粗面内质网</strong><span>rough-er.png</span><em>粗面内质网主体</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="golgi.png" alt="高尔基体"></div>
          <figcaption><strong>高尔基体</strong><span>golgi.png</span><em>高尔基体主体</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="cell-membrane.png" alt="细胞膜"></div>
          <figcaption><strong>细胞膜</strong><span>cell-membrane.png</span><em>右侧细胞膜区域</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="free-ribosome-left.png" alt="游离核糖体小人 A"></div>
          <figcaption><strong>游离核糖体小人 A</strong><span>free-ribosome-left.png</span><em>左侧合成起点小角色</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="free-ribosome-top.png" alt="游离核糖体小人 B"></div>
          <figcaption><strong>游离核糖体小人 B</strong><span>free-ribosome-top.png</span><em>上方合成起点小角色</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="ribosome-er-lower.png" alt="内质网上核糖体"></div>
          <figcaption><strong>内质网上核糖体</strong><span>ribosome-er-lower.png</span><em>贴在粗面内质网上的核糖体</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="protein-er.png" alt="内质网蛋白小人"></div>
          <figcaption><strong>内质网蛋白小人</strong><span>protein-er.png</span><em>内质网中的分泌蛋白角色</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="transport-vesicle-er.png" alt="运输小泡：离开内质网"></div>
          <figcaption><strong>运输小泡：离开内质网</strong><span>transport-vesicle-er.png</span><em>从内质网出芽的小泡</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="transport-vesicle-middle.png" alt="运输小泡：中途"></div>
          <figcaption><strong>运输小泡：中途</strong><span>transport-vesicle-middle.png</span><em>路线中段运输小泡</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="transport-vesicle-golgi.png" alt="运输小泡：进入高尔基体"></div>
          <figcaption><strong>运输小泡：进入高尔基体</strong><span>transport-vesicle-golgi.png</span><em>进入高尔基体的小泡</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="secretory-vesicle-upper.png" alt="分泌小泡：上路"></div>
          <figcaption><strong>分泌小泡：上路</strong><span>secretory-vesicle-upper.png</span><em>高尔基体输出的小泡</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="secretory-vesicle-lower.png" alt="分泌小泡：最终派送"></div>
          <figcaption><strong>分泌小泡：最终派送</strong><span>secretory-vesicle-lower.png</span><em>靠近细胞膜的分泌小泡</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="exocytosis-upper.png" alt="胞吐：上方融合"></div>
          <figcaption><strong>胞吐：上方融合</strong><span>exocytosis-upper.png</span><em>细胞膜融合/胞吐场景</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="exocytosis-lower.png" alt="胞吐：下方融合"></div>
          <figcaption><strong>胞吐：下方融合</strong><span>exocytosis-lower.png</span><em>下方胞吐场景</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="secreted-protein-top.png" alt="细胞外蛋白小人 A"></div>
          <figcaption><strong>细胞外蛋白小人 A</strong><span>secreted-protein-top.png</span><em>释放到细胞外的小人</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="secreted-protein-bottom.png" alt="细胞外蛋白小人 B"></div>
          <figcaption><strong>细胞外蛋白小人 B</strong><span>secreted-protein-bottom.png</span><em>右下角释放后的小人</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="mitochondrion.png" alt="线粒体"></div>
          <figcaption><strong>线粒体</strong><span>mitochondrion.png</span><em>线粒体素材</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="lysosome.png" alt="溶酶体"></div>
          <figcaption><strong>溶酶体</strong><span>lysosome.png</span><em>溶酶体素材</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="compass.png" alt="路径指南罗盘"></div>
          <figcaption><strong>路径指南罗盘</strong><span>compass.png</span><em>地图罗盘</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="title-banner.png" alt="标题横幅"></div>
          <figcaption><strong>标题横幅</strong><span>title-banner.png</span><em>顶部标题文字</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="step-number-1.png" alt="步骤编号 1"></div>
          <figcaption><strong>步骤编号 1</strong><span>step-number-1.png</span><em>数字 1 图标</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="step-number-3.png" alt="步骤编号 3"></div>
          <figcaption><strong>步骤编号 3</strong><span>step-number-3.png</span><em>数字 3 图标</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="step-number-4.png" alt="步骤编号 4"></div>
          <figcaption><strong>步骤编号 4</strong><span>step-number-4.png</span><em>数字 4 图标</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="step-number-5-upper.png" alt="步骤编号 5 上"></div>
          <figcaption><strong>步骤编号 5 上</strong><span>step-number-5-upper.png</span><em>上方数字 5 图标</em></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="step-number-5-lower.png" alt="步骤编号 5 下"></div>
          <figcaption><strong>步骤编号 5 下</strong><span>step-number-5-lower.png</span><em>下方数字 5 图标</em></figcaption>
        </figure>
        
    </section>
  </main>
</body>
</html>
