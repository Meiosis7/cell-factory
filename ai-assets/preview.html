<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 重新生成素材预览</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      color: #243044;
      background: linear-gradient(135deg, #f7fbf4, #e7f4f6 55%, #fff2dc);
    }
    main { width: min(1080px, 100%); margin: 0 auto; padding: 28px; }
    h1 { margin: 0 0 18px; font-size: clamp(24px, 3vw, 36px); letter-spacing: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; }
    figure {
      margin: 0;
      border-radius: 8px;
      overflow: hidden;
      background: rgba(255,255,255,.86);
      box-shadow: 0 12px 28px rgba(28,45,62,.12);
    }
    .wide { grid-column: span 2; }
    .preview {
      height: 180px;
      display: grid;
      place-items: center;
      padding: 14px;
      background:
        linear-gradient(45deg, rgba(30,45,60,.08) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(30,45,60,.08) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(30,45,60,.08) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(30,45,60,.08) 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    }
    img { max-width: 100%; max-height: 150px; object-fit: contain; }
    figcaption { display: grid; gap: 5px; padding: 12px 13px 14px; }
    strong { font-size: 15px; }
    span { color: #197f8f; font-size: 12px; word-break: break-all; }
  </style>
</head>
<body>
  <main>
    <h1>AI 重新生成素材预览</h1>
    <section class="grid">
      
        <figure class="wide">
          <div class="preview"><img src="clean-background.png" alt="干净地图背景"></div>
          <figcaption><strong>干净地图背景</strong><span>clean-background.png</span></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="nucleus-castle.png" alt="细胞核城堡"></div>
          <figcaption><strong>细胞核城堡</strong><span>nucleus-castle.png</span></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="rough-er.png" alt="粗面内质网"></div>
          <figcaption><strong>粗面内质网</strong><span>rough-er.png</span></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="golgi.png" alt="高尔基体"></div>
          <figcaption><strong>高尔基体</strong><span>golgi.png</span></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="cell-membrane.png" alt="细胞膜"></div>
          <figcaption><strong>细胞膜</strong><span>cell-membrane.png</span></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="ribosome-character.png" alt="核糖体/蛋白小人"></div>
          <figcaption><strong>核糖体/蛋白小人</strong><span>ribosome-character.png</span></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="transport-vesicle.png" alt="运输小泡"></div>
          <figcaption><strong>运输小泡</strong><span>transport-vesicle.png</span></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="secretory-vesicle.png" alt="分泌小泡"></div>
          <figcaption><strong>分泌小泡</strong><span>secretory-vesicle.png</span></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="mitochondrion.png" alt="线粒体"></div>
          <figcaption><strong>线粒体</strong><span>mitochondrion.png</span></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="ribosome.png" alt="核糖体"></div>
          <figcaption><strong>核糖体</strong><span>ribosome.png</span></figcaption>
        </figure>
        
        <figure>
          <div class="preview"><img src="peptide-chain.png" alt="肽链"></div>
          <figcaption><strong>肽链</strong><span>peptide-chain.png</span></figcaption>
        </figure>
        
    </section>
  </main>
</body>
</html>
